<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A dynamic education decision planner for comparing timing, program topology, life load, and career-risk assumptions." />
  <title>Education Decision Planner</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0f0d0a; color: #e8dcc8; font-family: Georgia, 'Times New Roman', serif; }
    input[type="range"] { width: 100%; accent-color: #c9813a; cursor: pointer; }
    input[type="text"] { width: 100%; background: #0f0d0a; border: 1px solid #3d3020; color: #f0e6d3; padding: 0.45rem 0.55rem; border-radius: 3px; }
    button { font: inherit; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .page-shell { max-width: 1040px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; }
    .panel { background: #14110d; border: 1px solid #2a2218; border-radius: 4px; padding: 1rem; }
    .tiny-label { font-size: 0.68rem; letter-spacing: 0.14em; color: #7a6f5e; text-transform: uppercase; font-family: monospace; }
    .chart-label { fill: #5a5040; font-size: 11px; font-family: monospace; }
    .chart-title { color: #8a7d6a; margin-bottom: 0.75rem; font-size: 0.78rem; font-style: italic; }
    .link-button { background: none; border: 1px solid #3d3020; color: #c9b89a; cursor: pointer; border-radius: 3px; padding: 0.4rem 0.7rem; font-size: 0.72rem; font-family: monospace; }
    .link-button:hover { border-color: #c9813a; color: #f0e6d3; }
    @media (max-width: 760px) { .page-shell { padding-left: 1rem; padding-right: 1rem; } .preset-grid { grid-template-columns: 1fr !important; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const EXAMPLES = {
      custom: { label: "Custom Program", icon: "✏️", executionFit: 1.0, hours: 360, tuition: 10000, desc: "Use your own school, program, bootcamp, certificate, or training path." },
      semester: { label: "Semester-based Example", icon: "🏛️", executionFit: 1.45, hours: 480, tuition: 18000, desc: "Fixed calendar, higher deadline density, less interruption tolerance." },
      competency: { label: "Competency Example", icon: "🎓", executionFit: 1.05, hours: 400, tuition: 8000, desc: "Self-paced within terms, moderate structure, variable accountability." },
      elastic: { label: "High-elasticity Example", icon: "🧭", executionFit: 0.9, hours: 360, tuition: 9750, desc: "Longer runway, low deadline density, interruption-tolerant topology." },
      intensive: { label: "Intensive Bootcamp Example", icon: "⚡", executionFit: 1.3, hours: 520, tuition: 15000, desc: "Short, concentrated, high activation pressure and high schedule collision." }
    };

    const DEFAULT_STATE = {
      title: "My education scenario",
      dependents: [
        { age: 3, care: 1, advanced: false, careEndAge: 18, longTermCare: 1 },
        { age: 5, care: 1, advanced: false, careEndAge: 18, longTermCare: 1 }
      ],
      ms: 2.2,
      s: 55,
      programKey: "custom",
      programLabel: "Custom Program",
      executionFit: 1.0,
      hours: 360,
      tuition: 10000,
      Cb: 8000,
      fieldRisk: 0.45,
      annualLoss: 45000,
      protection: 0.35,
      horizon: 25,
      discount: 0.04,
      Fs: 99,
      Ts: 6,
      prepHours: 80,
      prepFit: 0.85,
      prepLoadScale: 0.4
    };

    function safeNumber(value, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function loadInitialState() {
      const params = new URLSearchParams(window.location.search);
      const packed = params.get("s");
      if (!packed) return DEFAULT_STATE;
      try {
        const json = decodeURIComponent(atob(packed));
        const parsed = JSON.parse(json);
        return { ...DEFAULT_STATE, ...parsed };
      } catch (error) {
        console.warn("Could not parse shared state", error);
        return DEFAULT_STATE;
      }
    }

    function Ddev(age) {
      if (age <= 1) return 2.2;
      if (age <= 2) return 2.0;
      if (age <= 3) return 1.8;
      if (age <= 4) return 1.6;
      if (age <= 5) return 1.4;
      if (age <= 6) return 1.1;
      if (age <= 7) return 0.85;
      if (age <= 8) return 0.65;
      if (age <= 9) return 0.5;
      if (age <= 11) return 0.35;
      if (age <= 13) return 0.3;
      return 0.2;
    }

    function D(age) { return 0.3 + Ddev(age); }

    function dependentLoad(dependent, yearsFromNow) {
      const futureAge = safeNumber(dependent.age, 0) + yearsFromNow;
      const standardLoad = D(futureAge);
      if (!dependent.advanced) return safeNumber(dependent.care, 1) * standardLoad;
      const elevatedActive = futureAge < safeNumber(dependent.careEndAge, 18);
      const careNow = elevatedActive ? safeNumber(dependent.care, 1) : safeNumber(dependent.longTermCare, 1);
      return careNow * standardLoad;
    }

    function lifeLoad(dependents, yearsFromNow, rho = 0.3) {
      const loads = dependents.map(dep => dependentLoad(dep, yearsFromNow));
      const individual = loads.reduce((sum, load) => sum + load, 0);
      let interaction = 0;
      for (let j = 0; j < loads.length; j += 1) {
        for (let k = j + 1; k < loads.length; k += 1) interaction += loads[j] * loads[k];
      }
      return individual + rho * interaction;
    }

    function institutionalReliance(year) { return Math.min(1.25, 0.55 + 0.045 * year); }
    function discountFactor(rate, year) { return 1 / Math.pow(1 + rate, year); }

    function pvBenefitIfStart(state, startYear) {
      let pv = 0;
      for (let y = startYear; y < state.horizon; y += 1) {
        const annualRiskLoss = state.fieldRisk * institutionalReliance(y) * state.annualLoss;
        pv += annualRiskLoss * state.protection * discountFactor(state.discount, y);
      }
      return pv;
    }

    function pvRiskUncoveredBeforeStart(state, startYear) {
      let pv = 0;
      for (let y = 0; y < startYear; y += 1) {
        const annualRiskLoss = state.fieldRisk * institutionalReliance(y) * state.annualLoss;
        pv += annualRiskLoss * state.protection * discountFactor(state.discount, y);
      }
      return pv;
    }

    function computeYear(state, startYear) {
      const af = lifeLoad(state.dependents, startYear);
      const prepA = af * state.prepLoadScale;
      const universityLoadCost = state.ms * state.s * state.hours * state.executionFit * af;
      const prepCost = state.ms * state.s * state.prepHours * state.prepFit * prepA;
      const subscriptionLeakage = state.Fs * state.Ts;
      const directCost = state.tuition + state.Cb + subscriptionLeakage;
      const undiscountedCost = directCost + universityLoadCost + prepCost;
      const pvCost = undiscountedCost * discountFactor(state.discount, startYear);
      const benefit = pvBenefitIfStart(state, startYear);
      const uncovered = pvRiskUncoveredBeforeStart(state, startYear);
      const nv = benefit - pvCost;
      return { year: startYear, nv, benefit, uncovered, totalCost: pvCost, rawCost: undiscountedCost, universityLoadCost, prepCost, tuition: state.tuition, Cb: state.Cb, subscriptionLeakage, af, rt: institutionalReliance(startYear) };
    }

    function money(value) { return `${value >= 0 ? "+" : ""}$${Math.round(value / 1000)}k`; }
    function shortNum(value) { return `${value >= 0 ? "+" : ""}${Math.round(value / 1000)}k`; }
    function formatPlainMoney(value) { return `$${Math.round(value / 1000)}k`; }

    function shareUrl(state) {
      const payload = btoa(encodeURIComponent(JSON.stringify(state)));
      return `${window.location.origin}${window.location.pathname}?s=${payload}`;
    }

    function getSavedScenarios() {
      try { return JSON.parse(localStorage.getItem("education-scenarios") || "[]"); }
      catch { return []; }
    }

    function saveScenario(state) {
      const scenarios = getSavedScenarios();
      const saved = { id: Date.now(), title: state.title || "Untitled scenario", state };
      localStorage.setItem("education-scenarios", JSON.stringify([saved, ...scenarios].slice(0, 12)));
      return saved;
    }

    function SliderRow({ label, sublabel, min, max, step, value, onChange, format }) {
      return (
        <div style={{ marginBottom: "1.15rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "0.35rem", gap: "1rem" }}>
            <span style={{ fontSize: "0.76rem", color: "#c9b89a", letterSpacing: "0.04em", textTransform: "uppercase" }}>{label}</span>
            <span className="mono" style={{ fontSize: "1rem", color: "#f0e6d3", fontWeight: 600 }}>{format(value)}</span>
          </div>
          {sublabel && <div style={{ fontSize: "0.68rem", color: "#7a6f5e", marginBottom: "0.4rem", fontStyle: "italic" }}>{sublabel}</div>}
          <input type="range" min={min} max={max} step={step} value={value} onChange={event => onChange(parseFloat(event.target.value))} />
        </div>
      );
    }

    function MiniStat({ label, value, detail, color = "#c9b89a" }) {
      return <div className="panel"><div className="tiny-label">{label}</div><div className="mono" style={{ color, fontSize: "1.3rem", marginTop: "0.35rem" }}>{value}</div>{detail && <div style={{ color: "#6f6454", fontSize: "0.72rem", marginTop: "0.35rem", lineHeight: 1.45 }}>{detail}</div>}</div>;
    }

    function SimpleAreaChart({ data, dataKey, color, name, valueFormatter, height = 220, optimalYear = null }) {
      const width = 900;
      const pad = { left: 58, right: 24, top: 16, bottom: 34 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const values = data.map(d => d[dataKey]);
      const minValue = Math.min(0, ...values);
      const maxValue = Math.max(0, ...values);
      const span = maxValue - minValue || 1;
      const x = i => pad.left + (i / Math.max(1, data.length - 1)) * chartW;
      const y = v => pad.top + ((maxValue - v) / span) * chartH;
      const linePath = data.map((d, i) => `${i === 0 ? "M" : "L"}${x(i)},${y(d[dataKey])}`).join(" ");
      const areaPath = `${linePath} L${x(data.length - 1)},${y(0)} L${x(0)},${y(0)} Z`;
      const zeroY = y(0);
      const yTicks = [minValue, (minValue + maxValue) / 2, maxValue];
      return (
        <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height} role="img" aria-label={`${name} over time`}>
          <line x1={pad.left} x2={width - pad.right} y1={zeroY} y2={zeroY} stroke="#3d3020" strokeDasharray="4 4" />
          {yTicks.map((tick, i) => <g key={i}><line x1={pad.left} x2={width - pad.right} y1={y(tick)} y2={y(tick)} stroke="#1a1510" /><text x={pad.left - 10} y={y(tick) + 4} textAnchor="end" className="chart-label">{valueFormatter(tick)}</text></g>)}
          {data.map((d, i) => <g key={d.year}><line x1={x(i)} x2={x(i)} y1={height - pad.bottom} y2={height - pad.bottom + 5} stroke="#2a2218" />{i % 2 === 0 && <text x={x(i)} y={height - 10} textAnchor="middle" className="chart-label">+{d.year}yr</text>}</g>)}
          {optimalYear !== null && optimalYear > 0 && <g><line x1={x(optimalYear)} x2={x(optimalYear)} y1={pad.top} y2={height - pad.bottom} stroke="#c9813a" strokeDasharray="5 4" /><text x={x(optimalYear) + 5} y={pad.top + 12} fill="#c9813a" fontSize="11" fontFamily="monospace">best</text></g>}
          <path d={areaPath} fill={color} opacity="0.18" />
          <path d={linePath} fill="none" stroke={color} strokeWidth="3" />
          {data.map((d, i) => <g key={`point-${d.year}`}><circle cx={x(i)} cy={y(d[dataKey])} r="4" fill="#0f0d0a" stroke={color} strokeWidth="2" /><title>{`Year +${d.year}: ${name} ${valueFormatter(d[dataKey])}`}</title></g>)}
        </svg>
      );
    }

    function App() {
      const [state, setState] = useState(loadInitialState);
      const [saved, setSaved] = useState(getSavedScenarios);
      const [message, setMessage] = useState("");
      const update = patch => setState(current => ({ ...current, ...patch }));
      const updateDependent = (index, patch) => update({ dependents: state.dependents.map((dep, j) => j === index ? { ...dep, ...patch } : dep) });

      const timelineData = useMemo(() => Array.from({ length: Math.min(16, state.horizon + 1) }, (_, i) => {
        const r = computeYear(state, i);
        return { ...r, nv: Math.round(r.nv), benefit: Math.round(r.benefit), totalCost: Math.round(r.totalCost), rawCost: Math.round(r.rawCost), universityLoadCost: Math.round(r.universityLoadCost), prepCost: Math.round(r.prepCost), af: parseFloat(r.af.toFixed(2)), rt: parseFloat(r.rt.toFixed(2)) };
      }), [state]);

      const optimal = useMemo(() => timelineData.reduce((best, row) => row.nv > best.nv ? row : best, timelineData[0]), [timelineData]);
      const now = timelineData[0];
      const nextYear = timelineData[1] || now;
      const costPerProgramHour = state.ms * state.s * state.executionFit * now.af;
      const fitDelta = state.ms * state.s * state.hours * 0.1 * now.af;
      const verdict = optimal.year === 0 ? { label: "ACT NOW", color: "#4caf7d", sub: "The model currently favors starting immediately." } : optimal.year <= 2 ? { label: "SOON", color: "#c9813a", sub: `Best modeled start is around +${optimal.year} year${optimal.year > 1 ? "s" : ""}.` } : { label: "WAIT / WATCH", color: "#8b5cf6", sub: `Best modeled start is around +${optimal.year} years, under current assumptions.` };

      const applyExample = key => {
        const p = EXAMPLES[key];
        update({ programKey: key, programLabel: p.label, executionFit: p.executionFit, hours: p.hours, tuition: p.tuition });
      };

      const copyShare = async () => {
        const url = shareUrl(state);
        try { await navigator.clipboard.writeText(url); setMessage("Share link copied."); }
        catch { window.prompt("Copy this share link:", url); }
      };

      const handleSave = () => { const item = saveScenario(state); setSaved(getSavedScenarios()); setMessage(`Saved: ${item.title}`); };
      const addDependent = () => update({ dependents: [...state.dependents, { age: 1, care: 1, advanced: false, careEndAge: 18, longTermCare: 1 }] });
      const removeDependent = index => update({ dependents: state.dependents.filter((_, j) => j !== index) });

      return (
        <div>
          <header className="page-shell" style={{ borderBottom: "1px solid #2a2218", paddingTop: "2.5rem", paddingBottom: "2rem" }}>
            <div className="tiny-label">Education Decision Planner</div>
            <h1 style={{ fontSize: "clamp(1.7rem, 4vw, 2.8rem)", fontWeight: 400, lineHeight: 1.15, margin: "0.75rem 0 0", color: "#f0e6d3" }}>When should this education path fit into your life?</h1>
            <p style={{ fontSize: "0.95rem", color: "#8a7d6a", marginTop: "1rem", maxWidth: "720px", lineHeight: 1.65, fontStyle: "italic" }}>A scenario calculator for any education plan: first degree, return-to-school, certificate, bootcamp, graduate program, or professional training. It estimates the tradeoff between program value, timing, life load, and execution fit.</p>
          </header>

          <main className="page-shell" style={{ paddingTop: "2rem", paddingBottom: "4rem" }}>
            <section style={{ padding: "1.3rem 1.5rem", border: `1px solid ${verdict.color}44`, borderLeft: `3px solid ${verdict.color}`, background: `${verdict.color}0a`, borderRadius: "3px", marginBottom: "1.5rem" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "1rem", flexWrap: "wrap" }}>
                <span className="mono" style={{ fontSize: "1.35rem", color: verdict.color, fontWeight: 700, letterSpacing: "0.08em" }}>{verdict.label}</span>
                <span style={{ fontSize: "0.88rem", color: "#c9b89a", fontStyle: "italic" }}>{verdict.sub}</span>
                <span className="mono" style={{ marginLeft: "auto", fontSize: "0.75rem", color: "#7a6f5e" }}>best NV {money(optimal.nv)}</span>
              </div>
            </section>

            <section style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(210px, 1fr))", gap: "0.75rem", marginBottom: "2rem" }}>
              <MiniStat label="Today NV" value={money(now.nv)} detail="Net value if started now" color={now.nv >= 0 ? "#4caf7d" : "#e05c5c"} />
              <MiniStat label="Best modeled start" value={`+${optimal.year} yr`} detail={`Difference vs today: ${money(optimal.nv - now.nv)}`} color="#c9813a" />
              <MiniStat label="Cost per program hour now" value={formatPlainMoney(costPerProgramHour)} detail="Current life-load adjusted cost of one execution hour" />
              <MiniStat label="Execution fit sensitivity" value={formatPlainMoney(fitDelta)} detail="Approx. cost impact if fit worsens by 0.10 today" />
            </section>

            <section className="panel" style={{ marginBottom: "2rem" }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: "1rem", alignItems: "end" }}>
                <div><div className="tiny-label" style={{ marginBottom: "0.4rem" }}>Scenario title</div><input type="text" value={state.title} onChange={e => update({ title: e.target.value })} /></div>
                <button className="link-button" onClick={copyShare}>Copy share link</button>
                <button className="link-button" onClick={handleSave}>Save in browser</button>
                {message && <div style={{ color: "#4caf7d", fontSize: "0.78rem" }}>{message}</div>}
              </div>
              {saved.length > 0 && <div style={{ marginTop: "1rem" }}><div className="tiny-label" style={{ marginBottom: "0.5rem" }}>Saved states</div><div style={{ display: "flex", flexWrap: "wrap", gap: "0.5rem" }}>{saved.map(item => <button key={item.id} className="link-button" onClick={() => setState({ ...DEFAULT_STATE, ...item.state })}>{item.title}</button>)}</div></div>}
            </section>

            <section style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(330px, 1fr))", gap: "2rem" }}>
              <div>
                <div className="tiny-label" style={{ marginBottom: "1rem" }}>Life load / dependents</div>
                {state.dependents.map((dep, i) => <div key={i} className="panel" style={{ marginBottom: "0.85rem" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.75rem" }}><span className="mono" style={{ fontSize: "0.75rem", color: "#7a6f5e", width: "88px" }}>Dependent {i + 1}</span><input type="range" min="0" max="17" step="1" value={dep.age} onChange={e => updateDependent(i, { age: parseInt(e.target.value, 10) })} /><span className="mono" style={{ color: "#f0e6d3", width: "48px" }}>age {dep.age}</span>{state.dependents.length > 1 && <button className="link-button" onClick={() => removeDependent(i)}>×</button>}</div>
                  <SliderRow label="Care intensity" sublabel="1.0 = baseline; higher = elevated support needs" min={0.5} max={4} step={0.1} value={dep.care} onChange={value => updateDependent(i, { care: value })} format={v => `${v.toFixed(1)}×`} />
                  <label className="mono" style={{ display: "flex", gap: "0.5rem", alignItems: "center", color: "#7a6f5e", fontSize: "0.75rem" }}><input type="checkbox" checked={dep.advanced} onChange={e => updateDependent(i, { advanced: e.target.checked })} /> Advanced care duration</label>
                  {dep.advanced && <div style={{ marginTop: "0.9rem", borderTop: "1px solid #2a2218", paddingTop: "0.9rem" }}><SliderRow label="Elevated care until age" sublabel="After this age, the long-term floor applies" min={dep.age} max={30} step={1} value={dep.careEndAge} onChange={value => updateDependent(i, { careEndAge: value })} format={v => `age ${v}`} /><SliderRow label="Long-term care floor" sublabel="Care intensity after elevated duration ends" min={0.5} max={4} step={0.1} value={dep.longTermCare} onChange={value => updateDependent(i, { longTermCare: value })} format={v => `${v.toFixed(1)}×`} /></div>}
                </div>)}
                {state.dependents.length < 6 && <button className="link-button" onClick={addDependent}>+ add dependent / constraint</button>}

                <div style={{ borderTop: "1px solid #2a2218", paddingTop: "1.5rem", marginTop: "1.5rem" }}>
                  <SliderRow label="Hourly value" sublabel="Effective hourly rate or personal value estimate" min={0} max={250} step={5} value={state.s} onChange={v => update({ s: v })} format={v => `$${v}/hr`} />
                  <SliderRow label="Life-time multiplier" sublabel="Protected life/family/care time vs. work-time value" min={0} max={5} step={0.1} value={state.ms} onChange={v => update({ ms: v })} format={v => `${v.toFixed(1)}×`} />
                  <SliderRow label="Burnout / identity cost" sublabel="Estimated psychological and recovery cost" min={0} max={50000} step={1000} value={state.Cb} onChange={v => update({ Cb: v })} format={v => `$${Math.round(v / 1000)}k`} />
                </div>
              </div>

              <div>
                <div className="tiny-label" style={{ marginBottom: "1rem" }}>Program / topology</div>
                <div className="preset-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.5rem", marginBottom: "1rem" }}>{Object.entries(EXAMPLES).map(([key, p]) => <button key={key} onClick={() => applyExample(key)} className="link-button" style={{ textAlign: "left", borderColor: state.programKey === key ? "#c9813a" : "#3d3020", color: state.programKey === key ? "#f0e6d3" : "#c9b89a" }}><span style={{ marginRight: "0.35rem" }}>{p.icon}</span>{p.label}</button>)}</div>
                <div style={{ color: "#5a5040", fontSize: "0.72rem", fontStyle: "italic", lineHeight: 1.5, marginBottom: "1rem" }}>{EXAMPLES[state.programKey]?.desc || EXAMPLES.custom.desc}</div>
                <div style={{ marginBottom: "1rem" }}><div className="tiny-label" style={{ marginBottom: "0.4rem" }}>Program name</div><input type="text" value={state.programLabel} onChange={e => update({ programKey: "custom", programLabel: e.target.value })} /></div>
                <SliderRow label="Execution fit" sublabel="How efficiently you navigate this program's requirements vs. neutral baseline" min={0.5} max={2.5} step={0.05} value={state.executionFit} onChange={v => update({ executionFit: v })} format={v => `${v.toFixed(2)}×`} />
                <SliderRow label="Program hours" sublabel="Total execution hours to completion" min={0} max={1200} step={20} value={state.hours} onChange={v => update({ hours: v })} format={v => `${v}h`} />
                <SliderRow label="Direct cash cost" sublabel="Tuition, fees, tools, travel, books" min={0} max={100000} step={500} value={state.tuition} onChange={v => update({ tuition: v })} format={v => `$${(v / 1000).toFixed(1)}k`} />
                <div style={{ borderTop: "1px solid #2a2218", paddingTop: "1.5rem", marginTop: "1.5rem" }}>
                  <SliderRow label="Field / outcome risk" sublabel="How much credential or skill-risk matters in your target path" min={0} max={1} step={0.05} value={state.fieldRisk} onChange={v => update({ fieldRisk: v })} format={v => `${Math.round(v * 100)}%`} />
                  <SliderRow label="Annual risk exposure" sublabel="Estimated annual loss if the education signal/skill is missing" min={0} max={250000} step={5000} value={state.annualLoss} onChange={v => update({ annualLoss: v })} format={v => `$${Math.round(v / 1000)}k/yr`} />
                  <SliderRow label="Education protection" sublabel="How much of that risk this path plausibly reduces" min={0} max={1} step={0.05} value={state.protection} onChange={v => update({ protection: v })} format={v => `${Math.round(v * 100)}%`} />
                  <SliderRow label="Planning horizon" sublabel="How many future years this path remains relevant" min={1} max={40} step={1} value={state.horizon} onChange={v => update({ horizon: v })} format={v => `${v}yr`} />
                  <SliderRow label="Discount rate" sublabel="How strongly future value is discounted" min={0} max={0.15} step={0.005} value={state.discount} onChange={v => update({ discount: v })} format={v => `${(v * 100).toFixed(1)}%`} />
                </div>
              </div>
            </section>

            <section style={{ marginTop: "2.5rem", borderTop: "1px solid #2a2218", paddingTop: "2rem" }}>
              <div className="tiny-label" style={{ marginBottom: "1rem" }}>Timing analysis</div>
              <div className="chart-title">Net value of starting at each future year</div>
              <SimpleAreaChart data={timelineData} dataKey="nv" color="#c9813a" name="Net Value" valueFormatter={money} optimalYear={optimal.year} height={250} />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "2rem", marginTop: "2rem" }}>
                <div><div className="chart-title">Life/dependent load A(t)</div><SimpleAreaChart data={timelineData} dataKey="af" color="#8b5cf6" name="Life Load" valueFormatter={v => v.toFixed(2)} height={180} /></div>
                <div><div className="chart-title">PV benefit if started that year</div><SimpleAreaChart data={timelineData} dataKey="benefit" color="#4caf7d" name="PV Benefit" valueFormatter={money} height={180} /></div>
              </div>
            </section>

            <section className="panel" style={{ marginTop: "2rem" }}>
              <div className="tiny-label" style={{ marginBottom: "0.75rem" }}>What the model is allowed to say</div>
              <p style={{ color: "#8a7d6a", lineHeight: 1.65, margin: 0 }}>This planner does not know which school is “best.” It compares scenarios under your assumptions. Execution fit is not ability; it estimates how efficiently you can navigate a given program topology. Dependents are optional, and care intensity lets the same structure model children, caregiving, health constraints, or other life-load factors. URL sharing and saved states are intended so users can fork examples, model several schools, and revise assumptions as real details become clearer.</p>
            </section>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
